    {
      "@type": "Question",
      "name": "Is it normal for a 6-year-old to be anxious at bedtime?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Bedtime anxiety typically emerges between ages 5 and 7, when children develop a more sophisticated understanding of danger and permanence. Their imagination can generate scary scenarios, but their brain isn't yet mature enough to rationalise them away. This is a normal developmental stage."
      }
    },
    {
      "@type": "Question",
      "name": "How do I know if my child's bedtime anxiety needs professional help?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Seek professional guidance if bedtime fears persist most nights for more than 4–6 weeks, if anxiety is spreading to daytime activities like school or friendships, or if your child is regularly taking more than 45 minutes to fall asleep despite consistent routines. A paediatrician can refer you to a child psychologist if needed."
      }
    },
    {
      "@type": "Question",
      "name": "Should I let my anxious child sleep in my bed?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Occasionally co-sleeping during a rough patch is fine. But making it a regular solution teaches your child that they need your physical presence to feel safe, which reinforces the anxiety. Instead, work on gradual separation — sitting on their bed, then by the door, then in the hallway — so they build confidence falling asleep independently."
      }
    },
    {
      "@type": "Question",
      "name": "Why does my child's anxiety get worse at night but seem fine during the day?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "During the day, school, play, and screens keep your child's brain occupied. At bedtime, distractions disappear and the brain has space to process the worries it pushed aside. This is why anxiety \"shows up\" at night — it was always there, it just didn't have room to surface until the world got quiet."
      }
    }
  ]
