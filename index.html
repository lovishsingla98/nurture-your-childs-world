<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Basic SEO -->
    <title>Nurture – AI Co-pilot for Modern Parenting</title>
    <meta name="description" content="Personalized daily activities and moral stories for ages 3–12. Turn today's play into tomorrow's success.">
    <meta name="author" content="Cortiq Labs" />
    <link rel="canonical" href="https://nurture.org.in">

    <!-- Open Graph (social sharing) -->
    <meta property="og:title" content="Nurture – AI Co-pilot for Modern Parenting">
    <meta property="og:description" content="Personalized daily activities and moral stories for ages 3–12. Turn today's play into tomorrow's success.">
    <meta property="og:url" content="https://nurture.org.in">
    <meta property="og:image" content="https://nurture.org.in/og-cover.jpg">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Nurture">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nurture – AI Co-pilot for Modern Parenting">
    <meta name="twitter:description" content="Personalized daily activities and moral stories for ages 3–12.">
    <meta name="twitter:image" content="https://nurture.org.in/og-cover.jpg">
    <meta name="twitter:site" content="@cortiqlabs">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico">

    <!-- DNS prefetch for deferred third-party scripts -->
    <link rel="dns-prefetch" href="https://us.i.posthog.com">
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>

    <!-- Preload LCP hero image -->
    <link rel="preload" as="image" href="/images/child-parent-robot-hero-desktop.webp" type="image/webp" fetchpriority="high" imagesizes="(max-width: 768px) 390px, 700px" imagesrcset="/images/child-parent-robot-hero-mobile.webp 390w, /images/child-parent-robot-hero-desktop.webp 700w">
    <!-- Preload FCP logo -->
    <link rel="preload" as="image" href="/images/nurture-logo.webp">

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Nurture",
      "url": "https://nurture.org.in",
      "logo": "https://nurture.org.in/images/nurture-logo.webp",
      "description": "AI Co-pilot for Modern Parenting - Personalized daily activities and moral stories for ages 3–12",
      "foundingDate": "2024",
      "sameAs": ["https://www.instagram.com/nurtureapphq/"]
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"WebSite",
      "url":"https://nurture.org.in",
      "name": "Nurture",
      "description": "AI Co-pilot for Modern Parenting",
      "potentialAction":{
        "@type":"SearchAction",
        "target":"https://nurture.org.in/?q={search_term_string}",
        "query-input":"required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Nurture",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "AI Co-pilot for Modern Parenting - Personalized daily activities and moral stories for ages 3–12",
      "url": "https://nurture.org.in",
      "author": {
        "@type": "Organization",
        "name": "Cortiq Labs"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
